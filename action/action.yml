name: 'Vantyr MCP Security Scanner'
description: 'Scan MCP servers for security vulnerabilities and post Trust Scores on pull requests'
branding:
  icon: 'shield'
  color: 'blue'

inputs:
  target:
    description: 'GitHub repo URL to scan. Defaults to the current repository.'
    required: false
    default: ''
  threshold:
    description: 'Minimum Trust Score (0-100) to pass the check. Set to 0 to never fail.'
    required: false
    default: '70'
  post-comment:
    description: 'Post a PR comment with the scan results.'
    required: false
    default: 'true'
  upload-sarif:
    description: 'Upload SARIF results to GitHub Code Scanning.'
    required: false
    default: 'true'
  token:
    description: 'GitHub token for API access. Defaults to the built-in GITHUB_TOKEN.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Run Vantyr scan
      shell: bash
      run: node ${{ github.action_path }}/run.js
      env:
        INPUT_TARGET: ${{ inputs.target }}
        INPUT_THRESHOLD: ${{ inputs.threshold }}
        INPUT_POST_COMMENT: ${{ inputs.post-comment }}
        INPUT_UPLOAD_SARIF: ${{ inputs.upload-sarif }}
        INPUT_TOKEN: ${{ inputs.token }}
        GITHUB_TOKEN: ${{ github.token }}
        GITHUB_REPOSITORY: ${{ github.repository }}
        GITHUB_EVENT_NAME: ${{ github.event_name }}
        GITHUB_EVENT_PATH: ${{ github.event_path }}
        GITHUB_SHA: ${{ github.sha }}

    - name: Upload SARIF
      if: ${{ inputs.upload-sarif == 'true' && always() }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: vantyr-results.sarif
      continue-on-error: true
